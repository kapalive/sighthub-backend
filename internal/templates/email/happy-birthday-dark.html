<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday (Dark)</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background:#f1f5f9;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:500px; margin:0 auto; background:#475569; border-radius:16px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); border:1px solid #64748b;">
        <tr>
            <td style="padding:32px 24px; text-align:center; background:linear-gradient(135deg, #64748b 0%, #475569 100%); border-bottom:1px solid #64748b;">
                <p style="margin:0; font-size:11px; font-weight:600; color:rgba(253,230,138,0.95); letter-spacing:0.1em; text-transform:uppercase;">We celebrate you</p>
                <h2 style="margin:4px 0 0 0; font-size:24px; font-weight:700; color:#fcd34d;">Happy Birthday!</h2>
            </td>
        </tr>
        <tr>
            <td style="padding:24px; color:#f1f5f9; font-size:15px; line-height:1.6;">
                <p style="margin:0 0 16px 0;">Hello {{.patient_name}},</p>
                <p style="margin:0 0 16px 0;">We wish you a very happy birthday! Thank you for being part of our practice.</p>
                <p style="margin:24px 0 0 0; color:#cbd5e1;">Best wishes,<br><strong style="color:#e2e8f0;">Your Care Team</strong></p>
            </td>
        </tr>
        <tr>
            <td style="padding:12px 24px; border-top:1px solid #64748b; text-align:center; font-size:12px; color:#94a3b8;">— {{.organization_name}}</td>
        </tr>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Payment (Blue)</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background:#f1f5f9;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:500px; margin:0 auto; background:#fff; border-radius:16px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); border:1px solid #bfdbfe;">
        <tr>
            <td style="padding:32px 24px; text-align:center; background:linear-gradient(135deg, #2563eb 0%, #6366f1 50%, #7c3aed 100%);">
                <p style="margin:0; font-size:11px; font-weight:600; color:rgba(191,219,254,1); letter-spacing:0.1em; text-transform:uppercase;">We appreciate you</p>
                <h2 style="margin:4px 0 0 0; font-size:24px; font-weight:700; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.1);">Thank you for your payment</h2>
                <p style="margin:8px 0 0 0; font-size:14px; color:rgba(255,255,255,0.9);">Invoice {{.invoice_number}} &middot; {{.amount}}</p>
            </td>
        </tr>
        <tr>
            <td style="padding:24px; color:#334155; font-size:15px; line-height:1.6;">
                <p style="margin:0 0 16px 0;">Hello {{.patient_name}},</p>
                <p style="margin:0 0 16px 0;">Thank you for your payment. We have received {{.amount}} for Invoice {{.invoice_number}}.</p>
                <p style="margin:0 0 16px 0; color:#64748b;">A confirmation PDF is attached.</p>
                <p style="margin:24px 0 0 0; color:#64748b;">Best regards,<br><strong>Your Care Team</strong></p>
            </td>
        </tr>
        <tr>
            <td style="padding:12px 24px; border-top:1px solid #bfdbfe; text-align:center; font-size:12px; color:#64748b;">— {{.organization_name}}</td>
        </tr>
    </table>
</body>
</html>
